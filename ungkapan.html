<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ungkapan Terima Kasih</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 400px;
}

h1 {
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  margin: 20px 0;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4a47c9;
}

  </style>
</head>
<body><div class="container">
  <h1>💖 Terima Kasih 💖</h1>
  <p id="text">Klik tombol di bawah untuk melihat ungkapan terima kasih</p>
  <button onclick="generateText()">Tampilkan</button>
</div><script>
  const messages = [
    "Terima kasih sudah selalu ada di saat aku butuh ❤️",
    "Aku sangat menghargai semua yang kamu lakukan 🙏",
    "Kehadiranmu berarti banget buat aku ✨",
    "Makasih ya sudah jadi bagian penting dalam hidupku 💫",
    "Tanpa kamu mungkin semuanya terasa lebih sulit 💕",
    "Terima kasih atas dukungan dan perhatianmu 😊",
    "Kamu itu spesial, dan aku bersyukur mengenalmu 🌟",
    "Terima kasih sudah membuat hariku lebih baik 🌈"
  ];

  function generateText() {
    const random = messages[Math.floor(Math.random() * messages.length)];
    document.getElementById("text").innerText = random;
  }
</script></body>
</html>
